version: 2

general:
  branches:
    only:
      - master
jobs:
  build:
    docker:
      - image: romankhazanskii/arm_gcc_pvs:0.0.1
    steps:
      - checkout
      - run:
          name: Compile with gcc for arm
          when: always
          command: chmod +x .test/compile_with_gcc.sh && pvs-studio-analyzer trace -- .test/compile_with_gcc.sh 
          no_output_timeout: 1m
      - run:      
          name: PVS Studio check
          when: always
          command: chmod +x .test/pvs_check.sh && .test/pvs_check.sh
          no_output_timeout: 2m
      - run:
          name: Check code style
          when: always
          command: chmod +x .test/check_style.sh && chmod +x .test/replace_tabs_and_spaces && .test/check_style.sh 
          no_output_timeout: 1m
      - run:
          name: Check due date
          when: always
          command: chmod +x .test/date_checker.sh && .test/date_checker.sh
          no_output_timeout: 1m
